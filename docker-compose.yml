version: "3.8"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintwin
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  account-service:
    build: ./services/account-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintwin
      JWT_SECRET: fintwin-super-secret-key-2024
      ACCOUNT_SERVICE_URL: http://account-service:8001
    depends_on:
      db:
        condition: service_healthy

  transaction-service:
    build: ./services/transaction-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintwin
      JWT_SECRET: fintwin-super-secret-key-2024
      ACCOUNT_SERVICE_URL: http://account-service:8001
    depends_on:
      db:
        condition: service_healthy

  twin-service:
    build: ./services/twin-service
    ports:
      - "8003:8003"
    environment:
      JWT_SECRET: fintwin-super-secret-key-2024
      ACCOUNT_SERVICE_URL: http://account-service:8001

  risk-service:
    build: ./services/risk-service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintwin
      JWT_SECRET: fintwin-super-secret-key-2024
      ACCOUNT_SERVICE_URL: http://account-service:8001
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - account-service
      - transaction-service
      - twin-service
      - risk-service

volumes:
  pgdata:
